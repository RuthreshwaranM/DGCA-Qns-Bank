<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login &middot; Flight Flare Aviation</title>
<meta name="description" content="Student login for the Flight Flare Aviation DGCA Exam Bank.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/academy.css">
<link rel="icon" href="logo1.png" type="image/png">

<script src="js/protection.js" defer></script>

<style>
/* Login-card layout — uses the same design tokens as academy.css
   (with fallbacks) so it matches even before you wire in your real
   variable names. Rename the var() fallbacks below if yours differ. */
.ff-login-shell{ max-width:420px; margin:64px auto; padding:0 24px; }
.ff-login-card{
  background: var(--ff-panel-bg, #10182b);
  border: 1px solid var(--ff-border, rgba(212,175,55,0.2));
  border-radius: 16px;
  padding: 40px 32px 32px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}
.ff-login-title{
  font-family: var(--ff-font-display, 'Space Grotesk', sans-serif);
  font-size: 1.5rem;
  color: var(--ff-cream, #f4ecd8);
  text-align: center;
  margin-bottom: 6px;
}
.ff-login-sub{
  text-align: center;
  font-size: 0.85rem;
  color: var(--ff-muted, #8a94a8);
  margin-bottom: 28px;
}
#ff-login-btn:disabled{ opacity:.6; cursor:not-allowed; }
</style>
</head>
<body class="ff-page-body">

<header class="ff-topbar">
  <a href="aboutus.html" class="ff-brandbar">
    <img src="logo1.png" alt="Flight Flare Aviation" class="ff-logo">
    <div class="ff-brand-text">
      <strong>FLIGHT FLARE AVIATION</strong>
      <span>DGCA EXAM BANK</span>
    </div>
  </a>
</header>

<main class="ff-login-shell">
  <div class="ff-login-card">
    <div class="ff-login-title">Student Login</div>
    <div class="ff-login-sub">Enter your credentials to access the Exam Bank</div>

    <form class="ff-form" id="ff-login-form">
      <div class="ff-field">
        <label for="ff-l-name">Full Name</label>
        <input type="text" id="ff-l-name" name="name" required placeholder="Your full name" autocomplete="off">
      </div>
      <div class="ff-field">
        <label for="ff-l-userid">User ID</label>
        <input type="text" id="ff-l-userid" name="userId" required placeholder="e.g. FFA-001" autocomplete="off" style="text-transform:uppercase">
      </div>
      <div class="ff-field">
        <label for="ff-l-password">Password</label>
        <input type="password" id="ff-l-password" name="password" required placeholder="Your password" autocomplete="off">
      </div>
      <button type="submit" class="ff-submit" id="ff-login-btn">Login</button>
      <div class="ff-form-status" id="ff-login-status"></div>
    </form>
  </div>
</main>

<footer class="ff-footer">
  <div class="ff-footer-brand">
    <img src="logo1.png" alt="Flight Flare Aviation">
    <span>FLIGHT FLARE AVIATION</span>
  </div>
  <div class="ff-footer-links">
    <a href="aboutus.html">About Us</a>
    <a href="contactus.html">Contact Us</a>
  </div>
  <div class="ff-footer-copy">&copy; <span id="ff-year"></span> Flight Flare Aviation. All rights reserved.</div>
</footer>

<script>
document.getElementById('ff-year').textContent = new Date().getFullYear();

const form = document.getElementById('ff-login-form');
const status = document.getElementById('ff-login-status');
const btn = document.getElementById('ff-login-btn');

document.addEventListener('keydown', e => { if (e.key === 'Enter') form.requestSubmit(); });

form.addEventListener('submit', async function(e){
  e.preventDefault();
  const name = document.getElementById('ff-l-name').value.trim();
  const userId = document.getElementById('ff-l-userid').value.trim().toUpperCase();
  const password = document.getElementById('ff-l-password').value.trim();

  status.textContent = '';
  status.className = 'ff-form-status';

  if (!name || !userId || !password) {
    status.textContent = 'Please fill in all fields.';
    status.className = 'ff-form-status err';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, userId, password })
    });
    const data = await res.json();

    if (data.success) {
      status.textContent = 'Access granted — redirecting...';
      status.className = 'ff-form-status ok';
      /* Session token — no password stored client-side.
         This is a UI convenience only; the real gate is the
         ffa_token cookie the server just set, checked by /api/gate. */
      sessionStorage.setItem('ffa_auth', JSON.stringify({
        name: data.name, userId: data.userId, loggedIn: true, time: Date.now()
      }));
      setTimeout(() => { window.location.href = '/'; }, 700);
    } else {
      status.textContent = data.error || 'Invalid credentials.';
      status.className = 'ff-form-status err';
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  } catch (err) {
    status.textContent = 'Connection error. Please try again.';
    status.className = 'ff-form-status err';
    btn.disabled = false;
    btn.textContent = 'Login';
  }
});
</script>
</body>
</html>
